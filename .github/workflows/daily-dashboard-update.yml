name: Daily Dashboard Update

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      CHANNELS_CSV_PATH: data/channels_metrics.csv
      VK_POSTS_CSV_PATH: data/vk_posts_metrics.csv
      VK_API_TOKEN: ${{ secrets.VK_API_TOKEN }}
      VK_GROUP_ID: ${{ secrets.VK_GROUP_ID }}
      TG_CHANNEL_USERNAME: alterra_mordovia
      TG_SUBSCRIBERS_TOTAL: ${{ secrets.TG_SUBSCRIBERS_TOTAL }}
      TG_SUBSCRIBERS_GROWTH_30D: ${{ secrets.TG_SUBSCRIBERS_GROWTH_30D }}
      VK_SUBSCRIBERS_GROWTH_30D: ${{ secrets.VK_SUBSCRIBERS_GROWTH_30D }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Validate required real-data inputs
        run: |
          set -euo pipefail
          if [ -z "${VK_API_TOKEN:-}" ]; then
            echo "ERROR: Secret VK_API_TOKEN is required"
            exit 1
          fi
          if [ -z "${VK_GROUP_ID:-}" ]; then
            echo "ERROR: Secret VK_GROUP_ID is required"
            exit 1
          fi
          if [ ! -f "$CHANNELS_CSV_PATH" ]; then
            echo "ERROR: Required file not found: $CHANNELS_CSV_PATH"
            exit 1
          fi
          if [ ! -f "$VK_POSTS_CSV_PATH" ]; then
            echo "ERROR: Required file not found: $VK_POSTS_CSV_PATH"
            exit 1
          fi

      - name: Update dashboard data
        run: |
          set -euo pipefail
          python -u scripts/update_dashboard_data.py

      - name: Commit changes
        run: |
          if git diff --quiet; then
            echo "No changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add web/data/alterra_metrics.json
          git commit -m "chore: daily dashboard metrics update"
          git push
