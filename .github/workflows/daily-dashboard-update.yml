name: Daily Dashboard Update

on:
  schedule:
    - cron: "10 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Update dashboard data
        working-directory: "Альтера"
        env:
          VK_API_TOKEN: ${{ secrets.VK_API_TOKEN }}
          VK_GROUP_ID: ${{ secrets.VK_GROUP_ID }}
          CHANNELS_CSV_PATH: data/channels_metrics.csv
          VK_POSTS_CSV_PATH: data/vk_posts_metrics.csv
        run: |
          set -euxo pipefail
          ls -la
          ls -la scripts
          python -u scripts/update_dashboard_data.py

      - name: Commit changes
        working-directory: "Альтера"
        run: |
          if git diff --quiet; then
            echo "No changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add web/data/alterra_metrics.json
          git commit -m "chore: daily dashboard metrics update"
          git push
