name: Daily Dashboard Update

on:
  schedule:
    - cron: "10 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Update dashboard data
        env:
          VK_API_TOKEN: ${{ secrets.VK_API_TOKEN }}
          VK_GROUP_ID: ${{ secrets.VK_GROUP_ID }}
          CHANNELS_CSV_PATH: data/channels_metrics.csv
          VK_POSTS_CSV_PATH: data/vk_posts_metrics.csv
        run: python scripts/update_dashboard_data.py

      - name: Commit changes
        run: |
          if git diff --quiet; then
            echo "No changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add web/data/alterra_metrics.json
          git commit -m "chore: daily dashboard metrics update"
          git push
